name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # --- macOS 编译 ---
  macos:
    runs-on: macos-latest
    name: macos (${{ matrix.platform.target }})
    permissions:
      contents: write
    strategy:
      fail-fast: true
      matrix:
        platform:
          - target: "aarch64-apple-darwin"
          - target: "x86_64-apple-darwin"
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Protoc
        uses: arduino/setup-protoc@v1
        with:
          version: "3.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.platform.target }}

      - name: Zip Release
        uses: TheDoctor0/zip-release@0.7.6
        with:
          type: zip
          filename: ServerStatus-${{ matrix.platform.target }}.zip
          directory: target/${{ matrix.platform.target }}/release/
          path: |
            stat_server
            stat_client
            config.toml

      - name: Upload binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ github.ref_name }}
          files: target/${{ matrix.platform.target }}/release/ServerStatus-${{ matrix.platform.target }}.zip
          generate_release_notes: true
          draft: false

  # --- Linux (musl) 编译 ---
  linux:
    runs-on: ubuntu-latest
    name: linux (${{ matrix.platform.target }})
    permissions:
      contents: write
    strategy:
      fail-fast: true
      matrix:
        platform:
          - target: "x86_64-unknown-linux-musl"
          - target: "aarch64-unknown-linux-musl"
    container:
      image: docker://ghcr.io/rust-cross/rust-musl-cross:${{ matrix.platform.target }}
    steps:
      - uses: actions/checkout@v4
      
      # 容器内也需要 protoc
      - name: Install Protoc
        run: |
          apt-get update -y -qq
          apt-get install -y -qq protobuf-compiler zip git llvm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.platform.target }}

      - name: Zip Release
        uses: TheDoctor0/zip-release@0.7.6
        with:
          type: zip
          filename: ServerStatus-${{ matrix.platform.target }}.zip
          directory: target/${{ matrix.platform.target }}/release/
          path: |
            stat_server
            stat_client
            config.toml

      - name: Upload binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ github.ref_name }}
          files: target/${{ matrix.platform.target }}/release/ServerStatus-${{ matrix.platform.target }}.zip
          generate_release_notes: true
          draft: false

  # --- Windows & Android 交叉编译 ---
  windows-or-linux-others:
    name: Cross build for ${{ matrix.platform.target }}
    runs-on: ${{ matrix.platform.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        platform:
          - os: ubuntu-latest
            target: aarch64-linux-android
            suffix: ""
            use-cross: true
          - os: ubuntu-latest
            target: armv7-unknown-linux-musleabihf
            suffix: ""
            use-cross: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: .exe
            use-cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Protoc
        uses: arduino/setup-protoc@v1
        with:
          version: "3.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Install Cross
        if: matrix.platform.use-cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release
        run: |
          if [ "${{ matrix.platform.use-cross }}" = "true" ]; then
            cross build --release --target=${{ matrix.platform.target }}
          else
            cargo build --release --target=${{ matrix.platform.target }}
          fi
        shell: bash

      - name: Zip Release
        uses: TheDoctor0/zip-release@0.7.6
        with:
          type: zip
          filename: ServerStatus-${{ matrix.platform.target }}.zip
          directory: target/${{ matrix.platform.target }}/release/
          path: |
            stat_server${{matrix.platform.suffix}}
            stat_client${{matrix.platform.suffix}}
            config.toml

      - name: Upload binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ github.ref_name }}
          files: target/${{ matrix.platform.target }}/release/ServerStatus-${{ matrix.platform.target }}.zip
          generate_release_notes: true
          draft: false